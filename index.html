<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MNA 湄公产业资本联盟 · 财税业务管理平台</title>

<!-- ==================== CSS 样式（你原来的，我保留） ==================== -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'WenQuanYi Micro Hei', 'Noto Sans CJK SC', sans-serif; background: #f0f2f5; color: #333; font-size: 14px; min-height: 100vh; }
  .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f2b5e 0%, #1a4a8a 40%, #1e6fb3 100%); position: relative; overflow: hidden;}
  .login-box { background: #fff; border-radius: 16px; padding: 44px 40px; width: 440px; max-width: 92vw; box-shadow: 0 16px 50px rgba(0,0,0,0.2); position: relative; z-index: 1;}
  .login-logo { text-align: center; margin-bottom: 6px; }
  .login-logo .icon { font-size: 52px; }
  .login-logo h2 { font-size: 22px; color: #0f2b5e; margin: 8px 0 4px; }
  .login-logo p { font-size: 12px; color: #888; line-height: 1.6; }
  .login-form { margin-top: 28px; }
  .login-form .form-group { margin-bottom: 18px; }
  .login-form label { display: block; font-weight: 500; color: #555; margin-bottom: 6px; font-size: 13px; }
  .login-form input { width: 100%; padding: 10px 14px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px; font-family: inherit; }
  .login-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #0f2b5e, #1a4a8a); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .login-error { color: #ff4d4f; font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }
  
  /* 主应用隐藏 */
  .app-container { display: none; }
</style>
</head>
<body>

<!-- ==================== 登录页面 ==================== -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🏛️</div>
      <h2>MNA 业务管理平台</h2>
      <p>湄公产业资本联盟<br>默认账号：admin@mna.com / admin123</p>
    </div>
    <div class="login-form">
      <div class="form-group">
        <label>👤 用户名</label>
        <input type="text" id="loginUser" placeholder="admin@mna.com" autocomplete="username">
      </div>
      <div class="form-group">
        <label>🔑 密码</label>
        <input type="password" id="loginPass" placeholder="admin123" autocomplete="current-password" onkeypress="if(event.key==='Enter'){doLogin()}">
      </div>
      <button class="login-btn" onclick="doLogin()">登 录</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</div>

<!-- ==================== 主应用（登录后显示） ==================== -->
<div class="app-container" id="appContainer">
  <div style="height:100vh; display:flex; align-items:center; justify-content:center; font-size:24px; color:#1a4a8a;">
    🎉 登录成功！欢迎来到 MNA 业务管理平台！
    <br><br>
    <button onclick="logout()" style="padding:10px 20px; font-size:16px; cursor:pointer;">退出登录</button>
  </div>
</div>

<!-- ==================== JavaScript 逻辑（关键引擎） ==================== -->
<script>
/**
 * 简易哈希函数（防止 crypto.subtle 报错）
 */
async function hashText(text) {
  let hash = 0;
  for (let i = 0; i < text.length; i++) {
    hash = (hash << 5) - hash + text.charCodeAt(i);
    hash |= 0; // Convert to 32bit integer
  }
  return 'hashed_' + Math.abs(hash).toString(16);
}

/**
 * 初始化默认用户
 */
async function initDefaultUser() {
  let users = JSON.parse(localStorage.getItem('mna_users') || '{}');
  if (!users['admin@mna.com']) {
    users['admin@mna.com'] = {
      password: await hashText('admin123'),
      role: 'admin'
    };
    localStorage.setItem('mna_users', JSON.stringify(users));
    console.log('默认用户已初始化');
  }
}

/**
 * 登录函数
 */
window.doLogin = async function() {
  const userEl = document.getElementById('loginUser');
  const passEl = document.getElementById('loginPass');
  const errorEl = document.getElementById('loginError');
  
  const username = userEl.value.trim();
  const password = passEl.value;

  if (!username || !password) {
    errorEl.textContent = '请输入用户名和密码';
    return;
  }

  const users = JSON.parse(localStorage.getItem('mna_users') || '{}');
  const user = users[username];

  if (!user) {
    errorEl.textContent = '用户不存在';
    return;
  }

  const inputHashed = await hashText(password);
  if (user.password !== inputHashed) {
    errorEl.textContent = '密码错误';
    return;
  }

  // 登录成功
  localStorage.setItem('mna_session', JSON.stringify({ user: username, role: user.role }));
  showApp();
}

/**
 * 显示主应用
 */
function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appContainer').style.display = 'block';
}

/**
 * 退出登录
 */
window.logout = function() {
  localStorage.removeItem('mna_session');
  location.reload();
}

/**
 * 页面加载时检查登录态
 */
document.addEventListener('DOMContentLoaded', async () => {
  await initDefaultUser();
  const session = JSON.parse(localStorage.getItem('mna_session') || '{}');
  if (session.user) {
    showApp();
  }
});
</script>

</body>
</html>
