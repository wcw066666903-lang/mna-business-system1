<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MNA 湄公产业资本联盟 · 财税业务管理平台</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "WenQuanYi Micro Hei", "Noto Sans CJK SC", sans-serif;
  background: #f0f2f5;
  color: #333;
  font-size: 14px;
  min-height: 100vh;
}

/* ========== 登录页 ========== */
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0f2b5e 0%, #1a4a8a 40%, #1e6fb3 100%);
  position: relative;
  overflow: hidden;
}
.login-box {
  background: #fff;
  border-radius: 16px;
  padding: 44px 40px;
  width: 440px;
  max-width: 92vw;
  box-shadow: 0 16px 50px rgba(0,0,0,0.2);
  position: relative;
  z-index: 1;
}
.login-logo { text-align: center; margin-bottom: 6px; }
.login-logo .icon { font-size: 52px; }
.login-logo h2 { font-size: 22px; color: #0f2b5e; margin: 8px 0 4px; }
.login-logo p { font-size: 12px; color: #888; line-height: 1.6; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-weight: 500; color: #555; margin-bottom: 6px; }
.form-group input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid #d9d9d9;
  border-radius: 8px;
  font-size: 14px;
}
.login-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #0f2b5e, #1a4a8a);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.login-footer { text-align: center; margin-top: 24px; font-size: 11px; color: #bbb; }

/* ========== 主界面 ========== */
.app-container { display: none; min-height: 100vh; }
.app-header {
  background: linear-gradient(135deg, #0f2b5e 0%, #1a4a8a 100%);
  color: #fff;
  padding: 0 32px;
  height: 64px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.user-bar { display: flex; align-items: center; gap: 14px; }
.lang-switch {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff;
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}
</style>
</head>

<body>

<!-- ==================== 登录页 ==================== -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🏛️</div>
      <h2 data-i18n="login_title">MNA 业务管理平台</h2>
      <p data-i18n="login_sub">湄公产业资本联盟</p>
    </div>

    <div class="form-group">
      <label data-i18n="username">用户名</label>
      <input id="loginUser" type="text" data-i18n-placeholder="username" placeholder="请输入用户名">
    </div>

    <div class="form-group">
      <label data-i18n="password">密码</label>
      <input id="loginPass" type="password" data-i18n-placeholder="password" placeholder="请输入密码">
    </div>

    <button class="login-btn" onclick="doLogin()" data-i18n="login_btn">登 录</button>
    <div class="login-footer" data-i18n="copyright">© 2025 MNA</div>
  </div>
</div>

<!-- ==================== 主应用 ==================== -->
<div class="app-container" id="appContainer">
  <div class="app-header">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="font-size:22px;">🏛️</div>
      <div>
        <div style="font-size:16px;font-weight:700;" data-i18n="login_title">MNA 湄公产业资本联盟</div>
        <div style="font-size:11px;opacity:0.8;">Mekong Nexus Association</div>
      </div>
    </div>

    <div class="user-bar">
      <div>👤</div>
      <div>
        <div id="currentUserName">Admin</div>
        <div id="currentUserRole" style="font-size:11px;opacity:0.7;" data-i18n="admin">管理员</div>
      </div>

      <!-- ✅ 语言切换按钮 -->
      <button id="langSwitch" class="lang-switch">EN</button>
      <button onclick="doLogout()" data-i18n="logout">退出登录</button>
    </div>
  </div>

  <div style="padding:32px;">
    <h2 data-i18n="welcome">欢迎回来</h2>
    <p style="color:#888;" data-i18n="no_activity">暂无近期活动记录</p>
  </div>
</div>

<!-- ==================== 语言包 & 核心逻辑 ==================== -->
<script>
/* ✅ 只声明一次 i18n */
const i18n = {
  zh: {
    login_title: "MNA 业务管理平台",
    login_sub: "湄公产业资本联盟 Mekong Nexus Association",
    username: "用户名",
    password: "密码",
    login_btn: "登 录",
    logout: "退出登录",
    admin: "管理员",
    welcome: "欢迎回来",
    no_activity: "暂无近期活动记录",
    copyright: "© 2025 MNA · 仅授权用户可访问"
  },
  en: {
    login_title: "MNA Integrated Business Management Platform",
    login_sub: "Mekong Nexus Association · Connecting Industry, Capital & Government",
    username: "Username",
    password: "Password",
    login_btn: "Sign In",
    logout: "Terminate Session",
    admin: "Administrator",
    welcome: "Welcome Back",
    no_activity: "No recent activity",
    copyright: "© 2025 MNA · Authorized Access Only"
  }
};

let currentLang = localStorage.getItem("mna_lang") || "zh";

function toggleLanguage() {
  currentLang = currentLang === "zh" ? "en" : "zh";
  localStorage.setItem("mna_lang", currentLang);
  applyI18n();
  document.getElementById("langSwitch").innerText =
    currentLang === "zh" ? "EN" : "中";
}

function applyI18n() {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (i18n[currentLang][key]) {
      el.innerHTML = i18n[currentLang][key];
    }
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
    const key = el.getAttribute("data-i18n-placeholder");
    if (i18n[currentLang][key]) {
      el.placeholder = i18n[currentLang][key];
    }
  });
}

/* 初始化 */
document.addEventListener("DOMContentLoaded", () => {
  applyI18n();
  document.getElementById("langSwitch").innerText =
    currentLang === "zh" ? "EN" : "中";
});

/* 占位函数（避免你原有逻辑报错） */
function doLogin() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("appContainer").style.display = "block";
}
function doLogout() {
  location.reload();
}
</script>

</body>
</html>
