<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MNA 湄公产业资本联盟 · 财税业务管理平台</title>

<!-- ==================== CSS 样式 ==================== -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'WenQuanYi Micro Hei', 'Noto Sans CJK SC', sans-serif; background: #f0f2f5; color: #333; font-size: 14px; min-height: 100vh; }
  
  /* 登录页样式 */
  .login-page {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0f2b5e 0%, #1a4a8a 40%, #1e6fb3 100%);
    position: relative; overflow: hidden;
  }
  .login-page::before { content:''; position:absolute; width:500px; height:500px; background:rgba(255,255,255,0.04); border-radius:50%; top:-150px; left:-150px; }
  .login-page::after { content:''; position:absolute; width:400px; height:400px; background:rgba(255,255,255,0.03); border-radius:50%; bottom:-120px; right:-120px; }
  .login-box {
    background: #fff; border-radius: 16px; padding: 44px 40px; width: 440px; max-width: 92vw;
    box-shadow: 0 16px 50px rgba(0,0,0,0.2); position: relative; z-index: 1;
  }
  .login-logo { text-align: center; margin-bottom: 6px; }
  .login-logo .icon { font-size: 52px; }
  .login-logo h2 { font-size: 22px; color: #0f2b5e; margin: 8px 0 4px; }
  .login-logo p { font-size: 12px; color: #888; line-height: 1.6; }
  .login-form { margin-top: 28px; }
  .login-form .form-group { margin-bottom: 18px; }
  .login-form label { display: block; font-weight: 500; color: #555; margin-bottom: 6px; font-size: 13px; }
  .login-form input, .login-form select {
    width: 100%; padding: 10px 14px; border: 1px solid #d9d9d9; border-radius: 8px;
    font-size: 14px; font-family: inherit; transition: border-color 0.2s;
  }
  .login-form input:focus, .login-form select:focus { border-color: #1a4a8a; outline: none; box-shadow: 0 0 0 2px rgba(26,74,138,0.12); }
  .login-btn {
    width: 100%; padding: 12px; background: linear-gradient(135deg, #0f2b5e, #1a4a8a);
    color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s; font-family: inherit;
  }
  .login-btn:hover { opacity: 0.9; }
  .login-error { color: #ff4d4f; font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }
  .login-footer { text-align: center; margin-top: 24px; font-size: 11px; color: #bbb; }
  .login-links { display: flex; justify-content: space-between; margin-top: 14px; font-size: 12px; }
  .login-links a { color: #1a4a8a; cursor: pointer; text-decoration: none; }
  .login-links a:hover { text-decoration: underline; }

  /* 主界面样式 */
  .app-container { display: none; min-height: 100vh; }
  .app-header {
    background: linear-gradient(135deg, #0f2b5e 0%, #1a4a8a 100%);
    color: #fff; padding: 0 32px; height: 64px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .main-body { display: flex; min-height: calc(100vh - 64px); }
  .sidebar {
    width: 240px; background: #fff; border-right: 1px solid #e8e8e8; padding: 16px 0;
    flex-shrink: 0; overflow-y: auto;
  }
  .content-area { flex: 1; padding: 24px; overflow-y: auto; }
  .page-section { display: none; animation: fadeIn 0.2s ease; }
  .page-section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .panel { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); margin-bottom: 20px; }
  .panel h3 { font-size: 16px; color: #0f2b5e; margin-bottom: 16px; }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .controls button { padding: 7px 14px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; font-family: inherit; background: #1a4a8a; color: #fff; border: none; cursor: pointer; }
  .btn-green { background: #52c41a !important; } .btn-red { background: #ff4d4f !important; }
  
  /* 表格样式 */
  .table-wrapper { background: #fff; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  thead th { background: #fafbfc; padding: 11px 8px; text-align: center; font-weight: 600; color: #555; border-bottom: 1px solid #e8e8e8; }
  tbody td { padding: 10px 6px; text-align: center; border-bottom: 1px solid #f5f5f5; }
  .empty-state { text-align: center; padding: 48px 20px; color: #bbb; }
  
  /* Toast提示 */
  .toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; color: #fff; font-size: 14px; z-index: 2000; display: none; }
  .toast.show { display: block; } .toast.success { background: #52c41a; } .toast.error { background: #ff4d4f; }
</style>
</head>

<body>

<!-- ==================== 登录页面 ==================== -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🏛️</div>
      <h2>MNA 业务管理平台</h2>
      湄公产业资本联盟 Mekong Nexus Association连接产业 · 资本 · 政府 · 国际资源
    </div>
    <div class="login-form">
      <div class="form-group"><label>👤 用户名</label><input type="text" id="loginUser" placeholder="请输入用户名" autocomplete="username" autofocus></div>
      <div class="form-group"><label>🔑 密码</label><input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password"></div>
      <button class="login-btn" onclick="doLogin()">登 录</button>
      <div class="login-error" id="loginError"></div>
    </div>
    <div class="login-links">
      <a onclick="showResetPassword()">忘记密码？</a>
    </div>
    <div class="login-footer">© 2025 MNA · 仅授权用户可访问 · 数据加密存储</div>
  </div>
</div>

<!-- ==================== 主应用 ==================== -->
<div class="app-container" id="appContainer">
  <div class="app-header">
    <div class="brand">
      <div class="logo-icon">🏛️</div>
      <div class="brand-text">
        <h1>MNA 湄公产业资本联盟</h1>
        Mekong Nexus Association · 业务管理平台
      </div>
    </div>
    <div class="user-bar">
      <div class="avatar">👤</div>
      <div class="user-info">
        <div class="uname" id="currentUserName"></div>
        <div class="urole" id="currentUserRole"></div>
      </div>
      <button onclick="doLogout()">退出登录</button>
    </div>
  </div>

  <div class="main-body">
    <div class="sidebar">
      <div class="nav-group">
        <div class="nav-group-title">📊 概览</div>
        <button class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard')">
          <span class="nav-icon">🏠</span> 仪表盘
        </button>
      </div>
      <div class="nav-group">
        <div class="nav-group-title">🚢 业务板块</div>
        <button class="nav-item" data-page="logistics" onclick="switchPage('logistics')">
          <span class="nav-icon">🚢</span> 物流订单跟踪
        </button>
        <button class="nav-item" data-page="overseas" onclick="switchPage('overseas')">
          <span class="nav-icon">🏗️</span> 出海落地服务
        </button>
        <button class="nav-item" data-page="investment" onclick="switchPage('investment')">
          <span class="nav-icon">💰</span> 投融资对接
        </button>
      </div>
    </div>

    <div class="content-area">
      <!-- 仪表盘 -->
      <div class="page-section active" id="pageDashboard">
        <div class="panel">
          <h3>📌 业务概览</h3>
          <div class="summary-cards" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px;">
            <div class="card" style="background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); text-align: center; border-top: 3px solid #1a4a8a;">
              <div class="label" style="font-size: 12px; color: #888; margin-bottom: 8px;">🚢 物流订单</div>
              <div class="value" style="font-size: 28px; font-weight: 700; color: #0f2b5e;">12</div>
            </div>
            <div class="card" style="background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); text-align: center; border-top: 3px solid #d48806;">
              <div class="label" style="font-size: 12px; color: #888; margin-bottom: 8px;">👥 会员数</div>
              <div class="value" style="font-size: 28px; font-weight: 700; color: #d48806;">58</div>
            </div>
          </div>
          <p style="color: #666; line-height: 1.8;">
            欢迎使用 MNA 业务管理平台。目前系统运行正常，您可以开始管理您的业务数据。
          
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ==================== JavaScript 逻辑 ==================== -->
<script>
  // 简单的用户数据（模拟数据库）
  const users = [
    { username: 'admin@mna.com', password: 'admin123', name: '系统管理员', role: 'admin' },
    { username: 'user@mna.com', password: 'user123', name: '普通用户', role: 'user' }
  ];

  // 登录功能
  function doLogin() {
    const userInput = document.getElementById('loginUser').value.trim();
    const passInput = document.getElementById('loginPass').value.trim();
    const errorDiv = document.getElementById('loginError');
    
    errorDiv.innerText = '';
    
    if (!userInput || !passInput) {
      errorDiv.innerText = '❌ 用户名和密码不能为空';
      return;
    }
    
    // 模拟验证（直接对比明文）
    const foundUser = users.find(u => u.username === userInput && u.password === passInput);
    
    if (foundUser) {
      // 登录成功
      showToast('登录成功！正在进入系统...', 'success');
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('appContainer').style.display = 'flex';
      
      // 显示用户信息
      document.getElementById('currentUserName').innerText = foundUser.name;
      document.getElementById('currentUserRole').innerText = foundUser.role === 'admin' ? '管理员' : '普通用户';
      
      // 记录登录状态
      localStorage.setItem('isLogin', 'true');
      localStorage.setItem('currentUser', JSON.stringify(foundUser));
    } else {
      errorDiv.innerText = '❌ 用户名或密码错误，请重试';
    }
  }

  // 退出登录
  function doLogout() {
    localStorage.removeItem('isLogin');
    localStorage.removeItem('currentUser');
    document.getElementById('appContainer').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
    showToast('已安全退出', 'success');
  }

  // 切换页面（目前只有仪表盘）
  function switchPage(pageName) {
    // 隐藏所有页面
    const sections = document.querySelectorAll('.page-section');
    sections.forEach(s => s.classList.remove('active'));
    
    // 显示当前页面
    const target = document.getElementById('page' + pageName.charAt(0).toUpperCase() + pageName.slice(1));
    if (target) {
      target.classList.add('active');
    }
    
    // 更新侧边栏激活状态
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => item.classList.remove('active'));
    event.target.closest('.nav-item').classList.add('active');
  }

  // 显示提示
  function showToast(msg, type) {
    let toast = document.querySelector('.toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.className = 'toast';
      document.body.appendChild(toast);
    }
    toast.innerText = msg;
    toast.className = `toast ${type} show`;
    setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }

  // 页面加载时检查登录状态
  window.onload = function() {
    const isLogin = localStorage.getItem('isLogin');
    if (isLogin === 'true') {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('appContainer').style.display = 'flex';
      const user = JSON.parse(localStorage.getItem('currentUser'));
      if (user) {
        document.getElementById('currentUserName').innerText = user.name;
        document.getElementById('currentUserRole').innerText = user.role === 'admin' ? '管理员' : '普通用户';
      }
    }
  };

  // 辅助功能（占位）
  function showResetPassword() { alert('请联系管理员重置密码'); }
</script>

</body>
</html>
