    login_sub: "Mekong Nexus Association<br>Connecting Industry · Capital · Government · Global Resources",
    username: "👤 Username",

    forgot_pwd: "Forgot Password?",

    dashboard: "Dashboard",

    overview: "📊 Overview",
    business: "🚢 Business Modules",
    logistics: "Logistics Tracking",
    overseas: "Overseas Services",
    investment: "Investment Matching",
    commerce: "Commerce / Membership",

    taxAlliance: "Tax Alliance Reference",
    legalPricing: "Legal Pricing Rules",
    legalRisk: "Legal Risk Alerts"
  }
};

let currentLang = localStorage.getItem('mna_lang') || 'zh';

function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('mna_lang', lang);
  document.documentElement.lang = lang;

  const dict = i18n[lang];
  Object.keys(dict).forEach(key => {
    const el = document.getElementById('txt_' + key);
    if (el) el.innerHTML = dict[key];
  });

  document.getElementById('langLabel').innerText =
    lang === 'zh' ? 'EN' : '中';
}

function toggleLang() {
  applyLang(currentLang === 'zh' ? 'en' : 'zh');
}

/* 页面加载时应用语言 */
document.addEventListener('DOMContentLoaded', () => {
  applyLang(currentLang);
});
</script>
