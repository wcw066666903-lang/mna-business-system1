<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MNA 业务管理平台</title>
    
    <!-- 引入 Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #1a365d, #2c5282);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #fff;
            width: 380px;
            padding: 36px 32px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,.25);
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h1 {
            color: #1a365d;
            margin-bottom: 8px;
            font-size: 24px;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #1a365d;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn:hover {
            background: #2c5282;
        }

        .links {
            margin-top: 16px;
            font-size: 14px;
        }

        .links a {
            color: #1a365d;
            text-decoration: none;
            margin: 0 10px;
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #999;
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 8px;
            text-align: center;
            min-width: 300px;
        }

        .modal-btn {
            margin-top: 16px;
            padding: 8px 16px;
            background: #1a365d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">🏛️</div>
        <h1>MNA 业务管理平台</h1>
        <p class="subtitle">湄公产业资本联盟 Mekong Nexus Association
        <p class="subtitle">连接产业 · 资本 · 政府 · 国际资源

        <!-- 登录表单 -->
        <div id="login-form">
            <div class="form-group">
                <label for="username">👤 用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" />
            </div>
            <div class="form-group">
                <label for="password">🔑 密码</label>
                <input type="password" id="password" placeholder="请输入密码" />
            </div>
            <button class="btn" onclick="doLogin()">→ 登录</button>
            <div class="links">
                <a href="#" onclick="showModal('register-modal')">注册新用户</a>
                <a href="#">忘记密码？</a>
            </div>
        </div>

        <!-- 注册表单 (默认隐藏) -->
        <div id="register-form" style="display:none;">
            <div class="form-group">
                <label for="reg-username">👤 用户名</label>
                <input type="text" id="reg-username" placeholder="请设置用户名" />
            </div>
            <div class="form-group">
                <label for="reg-password">🔑 密码</label>
                <input type="password" id="reg-password" placeholder="请设置密码" />
            </div>
            <button class="btn" onclick="doRegister()">✓ 注册</button>
            <div class="links">
                <a href="#" onclick="showLogin()">已有账号？去登录</a>
            </div>
        </div>

        <div class="footer">
            © 2025 MNA · 仅授权用户可访问 · 数据加密存储
        </div>
    </div>

    <!-- 弹窗 -->
    <div id="success-modal" class="modal">
        <div class="modal-content">
            <p id="modal-message">登录成功！正在跳转...
            <button class="modal-btn" onclick="closeModal()">确定</button>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚠️ 重要：在这里填入你的 Supabase 信息
        // ==========================================
        const SUPABASE_URL = 'https://dicapkasnfjzbfmfyzyib.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_vSH9T39fUA4mfxC2E3QC1g_vH0bI...'; // 替换为你的公开密钥
        
        // 初始化 Supabase 客户端
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 显示弹窗
        function showModal(message) {
            document.getElementById('modal-message').innerText = message;
            document.getElementById('success-modal').style.display = 'flex';
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('success-modal').style.display = 'none';
        }

        // 切换登录/注册表单
        function showLogin() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('register-form').style.display = 'none';
        }

        function showRegister() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
        }

        // 登录功能
        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showModal('请输入用户名和密码');
                return;
            }

            try {
                // 1. 在 Supabase 中查找用户
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('username', username)
                    .single();

                if (error) throw error;

                // 2. 验证密码 (⚠️ 注意：生产环境必须用加密比对，这里为了演示直接比对明文)
                if (data && data.password === password) {
                    // 登录成功
                    localStorage.setItem('isLogin', 'true');
                    localStorage.setItem('currentUser', username);
                    showModal('登录成功！正在跳转...');
                    
                    // 模拟跳转（你可以改成你真正的后台页面）
                    setTimeout(() => {
                        window.location.href = 'dashboard.html'; // 如果没有这个页面，可以先注释掉
                    }, 1500);
                } else {
                    showModal('用户名或密码错误');
                }
            } catch (err) {
                console.error('登录失败:', err);
                showModal('登录失败，请重试');
            }
        }

        // 注册功能
        async function doRegister() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            if (!username || !password) {
                showModal('请输入用户名和密码');
                return;
            }

            try {
                // 1. 检查用户名是否已存在
                const { data: existing, error: checkError } = await supabase
                    .from('users')
                    .select('username')
                    .eq('username', username)
                    .single();

                if (existing) {
                    showModal('用户名已存在，请更换');
                    return;
                }

                // 2. 插入新用户 (⚠️ 注意：生产环境密码必须加密存储！)
                const { data, error } = await supabase
                    .from('users')
                    .insert([
                        { username: username, password: password }
                    ])
                    .select();

                if (error) throw error;

                showModal('注册成功！请登录');
                showLogin(); // 跳回登录页
            } catch (err) {
                console.error('注册失败:', err);
                showModal('注册失败：' + err.message);
            }
        }
    </script>

</body>
</html>
