<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNA 业务管理平台</title>
    <style>
        :root {
            --primary: #1a365d;
            --primary-light: #2c5282;
            --bg: #f7fafc;
            --card-bg: #ffffff;
            --text: #2d3748;
            --text-light: #718096;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-weight: 500;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* 修复后的登录按钮样式 */
        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background: var(--primary-light);
        }

        .footer-links {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-light);
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            margin: 0 10px;
        }

        .copyright {
            margin-top: 30px;
            font-size: 12px;
            color: var(--text-light);
        }

        /* 错误提示框 */
        .error-msg {
            background: #fed7d7;
            color: #c53030;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
    </style>
    <!-- 引入字体图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="login-card">
        <div class="logo">
            <i class="fas fa-landmark"></i>
        </div>
        <h1>MNA 业务管理平台</h1>
        <div class="subtitle">湄公产业资本联盟 Mekong Nexus Association</div>
        <div class="subtitle">连接产业 · 资本 · 政府 · 国际资源</div>

        <!-- 错误提示区域 -->
        <div id="errorMsg" class="error-msg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> 用户名</label>
                <div class="input-icon">
                    <input type="text" id="username" placeholder="请输入用户名" value="admin">
                </div>
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-key"></i> 密码</label>
                <div class="input-icon">
                    <input type="password" id="password" placeholder="请输入密码" value="admin123">
                </div>
            </div>

            <!-- 登录按钮 (这次绝对有了) -->
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> 登录
            </button>
        </form>

        <div class="footer-links">
            <a href="#">忘记密码？</a>
            <span>|</span>
            <a href="#">注册新用户</a>
        </div>

        <div class="copyright">
            © 2025 MNA · 仅授权用户可访问 · 数据加密存储
        </div>
    </div>

    <script>
        // 获取元素
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        
        // 修复点：直接用 form.addEventListener 代替 onclick，彻底解决 doLogin is not defined
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // 阻止表单默认提交刷新
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // 简单验证
            if(username === 'admin' && password === 'admin123') {
                // 登录成功，跳转到首页（这里先弹个窗模拟）
                alert('登录成功！正在跳转...');
                // 实际项目中这里应该是：window.location.href = 'dashboard.html';
            } else {
                errorMsg.textContent = '用户名或密码错误！请尝试 admin / admin123';
                errorMsg.style.display = 'block';
            }
        });

        // 可选：如果输入框有内容，隐藏错误提示
        document.getElementById('username').addEventListener('input', () => {
            errorMsg.style.display = 'none';
        });
        document.getElementById('password').addEventListener('input', () => {
            errorMsg.style.display = 'none';
        });
    </script>
</body>
</html>
