<!-- ==================== JavaScript 核心逻辑（终于加上了！）==================== -->
<script>
  // ==========================================
  // 1. 配置区域 (在这里填你的 Supabase 密钥)
  // ==========================================
  const CONFIG = {
    // 🔴 警告：这是公开的测试数据，任何人都能看到。
    // 在实际项目中，密码应该加密传输，或者使用后端验证。
    ADMIN_USER: 'admin@mna.com',
    ADMIN_PASS: 'admin123',
    
    // 🟢 如果你想连接真实的数据库，把下面这两行填好
    // SUPABASE_URL: 'https://你的项目ID.supabase.co',
    // SUPABASE_KEY: '你的Publishable Key'
  };

  // ==========================================
  // 2. 全局变量
  // ==========================================
  let currentUser = null;

  // ==========================================
  // 3. 页面加载时执行
  // ==========================================
  document.addEventListener('DOMContentLoaded', () => {
    // 检查本地存储，看看有没有已经登录的用户
    const savedUser = localStorage.getItem('mna_current_user');
    if (savedUser) {
      currentUser = JSON.parse(savedUser);
      showApp();
    } else {
      showLogin();
    }
    
    // 设置今天的日期
    const today = new Date();
    document.getElementById('todayDate').textContent = today.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
  });

  // ==========================================
  // 4. 登录/登出功能
  // ==========================================
  function doLogin() {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    const errorDiv = document.getElementById('loginError');

    // 简单验证
    if (!user || !pass) {
      errorDiv.textContent = '请输入用户名和密码';
      return;
    }

    // 🔐 模拟登录验证 (这里暂时不用 Supabase，保证你能进去)
    // 实际项目中，这里应该调用 Supabase 的 auth.signInWithPassword
    if (user === CONFIG.ADMIN_USER && pass === CONFIG.ADMIN_PASS) {
      // 登录成功
      currentUser = { email: user, role: 'admin' };
      localStorage.setItem('mna_current_user', JSON.stringify(currentUser));
      showApp();
      showToast('登录成功！欢迎回来', 'success');
    } else {
      errorDiv.textContent = '用户名或密码错误，请重试';
    }
  }

  function doLogout() {
    currentUser = null;
    localStorage.removeItem('mna_current_user');
    showLogin();
    // 清空输入框
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
    showToast('已安全退出登录', 'success');
  }

  // ==========================================
  // 5. 页面切换功能
  // ==========================================
  function showLogin() {
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('registerPage').style.display = 'none';
    document.getElementById('resetPage').style.display = 'none';
    document.getElementById('appContainer').style.display = 'none';
  }

  function showApp() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appContainer').style.display = 'flex';
    
    // 设置用户信息
    document.getElementById('currentUserName').textContent = currentUser.email;
    document.getElementById('currentUserRole').textContent = currentUser.role === 'admin' ? '系统管理员' : '普通用户';
    
    // 显示欢迎语
    document.getElementById('welcomeTitle').textContent = `👋 欢迎回来，${currentUser.email.split('@')[0]}！`;
    
    // 默认显示仪表盘
    switchPage('dashboard');
    
    // 加载一些模拟数据 (为了让页面看起来不空)
    loadMockData();
  }

  // ==========================================
  // 6. 菜单切换
  // ==========================================
  function switchPage(pageId) {
    // 隐藏所有页面
    const sections = document.querySelectorAll('.page-section');
    sections.forEach(sec => sec.classList.remove('active'));
    
    // 显示选中的页面
    document.getElementById('page' + pageId.charAt(0).toUpperCase() + pageId.slice(1)).classList.add('active');
    
    // 更新菜单激活状态
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => item.classList.remove('active'));
    event.target.closest('.nav-item').classList.add('active');
  }

  // 子菜单切换
  function switchSubTab(btn, tabId) {
    const parent = btn.closest('.sub-tabs');
    parent.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    const container = btn.closest('.page-section').querySelector('.content-area');
    container.querySelectorAll('[id$="List"], [id$="Ledger"]').forEach(el => el.style.display = 'none');
    document.getElementById(tabId).style.display = 'block';
  }

  // ==========================================
  // 8. 辅助功能 (Toast提示)
  // ==========================================
  function showToast(msg, type = 'success') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    document.body.appendChild(toast);
    
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => document.body.removeChild(toast), 300);
    }, 3000);
  }
